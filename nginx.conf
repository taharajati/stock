# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name easyvest.ir;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name easyvest.ir;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/easyvest.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easyvest.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Debug headers
    add_header X-Debug-Message $request_uri always;
    add_header X-Debug-Upstream $upstream_addr always;

    # Logging
    access_log /var/log/nginx/easyvest.access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/easyvest.error.log debug;

    # === BACKEND API AND AUTH ===
    location ~ ^/(auth|api)/ {
        proxy_pass http://[::1]:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        proxy_cookie_path / "/; secure; HttpOnly; SameSite=none";
        
        # Debug headers
        add_header X-Debug-Backend "true" always;
        add_header X-Debug-Request-URI $request_uri always;
        add_header X-Debug-Host $host always;
    }

    # === FRONTEND (React build) ===
    location / {
        proxy_pass http://[::1]:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Handle React Router
        try_files $uri $uri/ /index.html;
        
        # Debug headers
        add_header X-Debug-Frontend "true" always;
        add_header X-Debug-Request-URI $request_uri always;
    }

    # === STATIC FILES ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass http://[::1]:5001;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Debug-Static "true" always;
    }

    location /static/ {
        root /root/stock/stock/frontend/build;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Debug-Static "true" always;
    }

    location /media/ {
        root /root/stock/stock/frontend/build;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Debug-Static "true" always;
    }

    # === CUSTOM ERROR PAGES ===
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
