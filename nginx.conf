# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name easyvest.ir www.easyvest.ir;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name easyvest.ir www.easyvest.ir;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/easyvest.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easyvest.ir/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Logging
    access_log /var/log/nginx/easyvest.access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/easyvest.error.log warn;

    # === API BACKEND ===
    location /api/ {
           proxy_pass http://localhost:5003/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
        include proxy_params;


        # CORS
        add_header 'Access-Control-Allow-Origin' 'https://easyvest.ir' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Debug Headers
        add_header X-Debug-Message "Proxying to backend API" always;
        add_header X-Debug-Upstream "http://localhost:5003" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # === AUTH ROUTES ===
    location /auth/ {
    proxy_pass http://localhost:5003/auth/;
        include proxy_params;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # CORS
        add_header 'Access-Control-Allow-Origin' 'https://easyvest.ir' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Debug Headers
        add_header X-Debug-Message "Proxying to backend Auth" always;
        add_header X-Debug-Upstream "http://localhost:5003" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        error_log /var/log/nginx/auth_debug.log debug;
    }

    # === FRONTEND (React build) ===
    location / {
    proxy_pass http://localhost:5001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;

        root /root/stock/stock/frontend/build;
        index index.html;
        try_files $uri /index.html;

        # Disable caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

        error_log /var/log/nginx/frontend_debug.log debug;
    }

    # === STATIC FILES ===
    location /static/ {
        root /root/stock/stock/frontend/build;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /media/ {
        root /root/stock/stock/frontend/build;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # === CUSTOM ERROR PAGES ===
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
